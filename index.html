<style>

  --content-text: #111827;
  --content-secondary: #4B5563;

  * { box-sizing: border-box;margin: 0;padding: 0;}
  body { font-family: "Noto Sans JP", sans-serif;background: var(--content-bg);color: var(--content-text);display: flex;height: 100vh;height: 100dvh;overflow: hidden;}

  /* SIDEBAR */
  #sidebar { width: var(--sidebar-width);background: var(--bg-dark);display: flex;flex-direction: column;height: 100vh;height: 100dvh;flex-shrink: 0;}
  .sidebar-header { padding: 20px 16px 14px;border-bottom: 1px solid var(--border);}
  .sidebar-logo { display: flex;align-items: center;gap: 8px;}
  .sidebar-logo-icon { width: 28px;height: 28px;background: linear-gradient(135deg, #3B82F6, #8B5CF6);border-radius: 6px;display: flex;align-items: center;justify-content: center;font-size: 14px;}
  .sidebar-logo-text { font-size: 13px;font-weight: 700;color: var(--text-primary);line-height: 1.3;}
  .sidebar-logo-sub { font-size: 10px;color: var(--text-muted);font-weight: 400;}
  .sidebar-search { margin: 12px 12px 0;position: relative;}
  .sidebar-search input { width: 100%;background: var(--bg-panel);border: 1px solid var(--border);border-radius: 6px;padding: 7px 10px 7px 30px;font-size: 12px;color: var(--text-primary);font-family: inherit;outline: none;transition: border-color 0.2s;}
  .sidebar-search input:focus { border-color: #3B82F6;}
  .sidebar-search input::placeholder { color: var(--text-muted);}
  .sidebar-search-icon { position: absolute;left: 9px;top: 50%;transform: translateY(-50%);color: var(--text-muted);font-size: 12px;}
  .sidebar-nav { flex: 1;overflow-y: auto;padding: 8px 0 16px;}
  .sidebar-nav::-webkit-scrollbar { width: 4px;}
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border);border-radius: 2px;}
  .nav-section-label { padding: 10px 16px 4px;font-size: 10px;font-weight: 700;color: var(--text-muted);letter-spacing: 0.08em;text-transform: uppercase;}
  .nav-item { display: flex;align-items: center;gap: 10px;padding: 9px 14px;cursor: pointer;border-left: 3px solid transparent;transition: all 0.15s;color: var(--text-secondary);font-size: 13px;font-weight: 500;position: relative;}
  .nav-item:hover { background: var(--bg-hover);color: var(--text-primary);}
  .nav-item.active { background: var(--bg-active);color: var(--text-primary);}
  .nav-item-icon { font-size: 15px;width: 20px;text-align: center;flex-shrink: 0;}
  .nav-item-label { flex: 1;}
  .nav-item-badge { font-size: 10px;background: var(--bg-hover);color: var(--text-muted);padding: 1px 6px;border-radius: 10px;}
  .nav-item.active .nav-item-badge { background: rgba(255,255,255,0.1);color: var(--text-secondary);}
  .nav-accent-bar { position: absolute;left: 0;top: 0;bottom: 0;width: 3px;border-radius: 0 2px 2px 0;display: none;}
  .nav-item.active .nav-accent-bar { display: block;}

  /* MAIN */
  #main { flex: 1;display: flex;flex-direction: column;overflow: hidden;}
  .topbar { background: #fff;border-bottom: 1px solid var(--content-border);padding: 0 28px;height: 54px;display: flex;align-items: center;gap: 12px;flex-shrink: 0;}
  .breadcrumb { display: flex;align-items: center;gap: 6px;font-size: 13px;color: var(--content-secondary);}
  .breadcrumb-sep { color: #D1D5DB;}
  .breadcrumb-current { color: var(--content-text);font-weight: 600;}
  .topbar-badge { margin-left: auto;font-size: 11px;padding: 3px 10px;border-radius: 20px;font-weight: 600;}
  .content-area { flex: 1;overflow-y: auto;padding: 32px 36px;}
  .content-area::-webkit-scrollbar { width: 6px;}
  .content-area::-webkit-scrollbar-thumb { background: #D1D5DB;border-radius: 3px;}

  /* CATEGORY HEADER */

  .sections-grid { display: grid;gap: 12px;}

  .section-toggle { font-size: 18px;color: #9CA3AF;transition: transform 0.2s;line-height: 1;}

  .section-body { display: none;padding: 0 18px 16px 38px;border-top: 1px solid var(--content-border);}
  .section-body.open { display: block;}

  .task-item::before { content: "";width: 5px;height: 5px;border-radius: 50%;background: #D1D5DB;flex-shrink: 0;margin-top: 7px;}

  /* NESTED SUBSECTIONS */
  .subsection-list { margin: 10px 0 4px 0;display: flex;flex-direction: column;gap: 6px;}
  .subsection-card { background: #F8FAFF;border: 1px solid #E5E7EB;border-radius: 8px;overflow: hidden;}
  .subsection-header { display: flex;align-items: center;gap: 10px;padding: 10px 14px;cursor: pointer;user-select: none;}

<script>

function toggleSidebar() {
  const sb = document.getElementById("sidebar");
  const ov = document.getElementById("sidebarOverlay");
  sb.classList.toggle("open");
  ov.classList.toggle("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}

window._lbSrcs = {}; const _lbSrcs = window._lbSrcs;


function switchKintoneMode(mode) {
  // タブの active状態切り替え
  const tabs = document.querySelectorAll('.img-tab[data-mode]');
  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  // 全 .kintone-img の src を切り替え
  const imgs = document.querySelectorAll('.kintone-img');
  imgs.forEach(img => {
    const newSrc = mode === 'mobile' ? img.dataset.mobileSrc : img.dataset.pcSrc;
    if (newSrc && img.src !== newSrc) img.src = newSrc;
    // Lightbox用のsrc登録も更新
    const k = img.dataset.lbKey;
    if (k && window._lbSrcs) window._lbSrcs[k] = newSrc;
  });
  // 現在のモードを保存（リロード時の復元用）
  window._kintoneMode = mode;
}

function openLightbox(idx) {
  const src = _lbSrcs[idx];
  if (!src) return;
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
  document.getElementById("lightboxImg").src = "";
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

function doLogout() {
  if (!confirm("ログアウトしますか?")) return;
  localStorage.removeItem("manualUser");
  currentMember = null;
  showLogin();
}

function showLogin() {
  document.getElementById("loginEmail").value = "";
  document.getElementById("loginPassword").value = "";
  document.getElementById("loginError").textContent = "";
  document.getElementById("loginScreen").style.display = "flex";
}

function doLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const member = members.find(m => m.email === email && m.password === password);
  if (member) {
  document.getElementById("loginError").textContent = "";
  selectMember(member);
  } else {
  document.getElementById("loginError").textContent = "メールアドレスまたはパスワードが違います";
  }
}


function selectMember(member) {
  currentMember = member;
  localStorage.setItem("manualUser", member.id);
  document.getElementById("loginScreen").style.display = "none";

  // サイドバーのユーザー表示を更新
  document.getElementById("sidebarAvatar").textContent = member.initial;
  document.getElementById("sidebarAvatar").style.background = member.color;
  document.getElementById("sidebarUserName").textContent = member.name;

  // カテゴリフィルター適用
  const filtered = member.categories
  ? data.filter(cat => member.categories.includes(cat.id))
  : data;

  currentCat = filtered[0];
  buildFilteredNav(filtered);
  renderContent(filtered[0]);

  // URLハッシュがあれば反映
  setTimeout(handleHashChange, 100);
}

function buildFilteredNav(filteredData) {
  const nav = document.getElementById("sidebarNav");
  nav.innerHTML = '<div class="nav-section-label">カテゴリ</div>';
  filteredData.forEach(cat => {
  const el = document.createElement("div");
  el.className = "nav-item" + (cat.id === currentCat.id ? " active" : "");
  el.innerHTML = `
    <div class="nav-accent-bar" style="background:${cat.color}"></div>
    <span class="nav-item-icon">${cat.icon}</span>
    <span class="nav-item-label">${cat.label}</span>
    <span class="nav-item-badge">${cat.sections.length}</span>
  `;
  el.onclick = () => {
    if (searchQuery) { document.getElementById("searchInput").value = ""; searchQuery = ""; }
    currentCat = cat; openSections.clear();
    buildFilteredNav(filteredData); renderContent(cat);
    closeSidebar();
  };
  nav.appendChild(el);
  });
}

function closeFeatureModal() {
  document.getElementById("featureModal").style.display = "none";
}

// ========== URLハッシュからの復元 ==========
function handleHashChange() {
  const hash = decodeURIComponent(window.location.hash.substring(1));
  if (hash) {
  const cat = data.find(c => c.id === hash);
  if (cat && currentMember) {
    currentCat = cat;
    openSections.clear();
    const filtered = currentMember.categories ? data.filter(c => currentMember.categories.includes(c.id)) : data;
    buildFilteredNav(filtered);
    renderContent(cat);
  }
  }
}

window.addEventListener("hashchange", handleHashChange);

// ========== メモ・お気に入り機能の廃止に伴うlocalStorageクリーンアップ ==========
// 2026-04-29: メモ機能・お気に入り機能を廃止。過去にユーザー端末に保存された
// memo_*, favorites_*, manualMigrations キーを掃除する。1回だけ走る。
function cleanupRemovedFeatures() {
  const FLAG_KEY = "manualCleanups";
  const CLEANUP_NAME = "removeMemoAndFavorites_v1";
  let done = {};
  try { done = JSON.parse(localStorage.getItem(FLAG_KEY) || "{}"); } catch (e) { done = {}; }
  if (done[CLEANUP_NAME]) return;

  const keysToRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
  const k = localStorage.key(i);
  if (!k) continue;
  if (k.startsWith("memo_") || k.startsWith("favorites_") || k === "manualMigrations") {
    keysToRemove.push(k);
  }
  }
  keysToRemove.forEach(k => localStorage.removeItem(k));

  done[CLEANUP_NAME] = Date.now();
  localStorage.setItem(FLAG_KEY, JSON.stringify(done));
}

function toggleSection(index, headerEl) {
  const body = headerEl.nextElementSibling;
  const toggle = headerEl.querySelector(".section-toggle");
  const isOpen = body.classList.toggle("open");
  toggle.classList.toggle("open", isOpen);
  if (isOpen) openSections.add(index); else openSections.delete(index);
}

function toggleSubsection(event, id) {
  event.stopPropagation();
  const body = document.getElementById(`sbod-${id}`);
  const toggle = document.getElementById(`stog-${id}`);
  if (!body) return;
  const isOpen = body.classList.toggle("open");
  toggle.classList.toggle("open", isOpen);
}

// ========== 検索（強化版） ==========

// HTMLタグを除去してプレーンテキストにする
function stripHtml(s) {
  return String(s).replace(/<[^>]*>/g, "").replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
}

// 検索用に正規化：小文字化／全角英数→半角／カタカナ→ひらがな／前後空白除去
function normalizeForSearch(s) {
  if (!s) return "";
  let t = String(s);
  // 全角英数記号 → 半角
  t = t.replace(/[\uFF01-\uFF5E]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
  // 全角スペース → 半角
  t = t.replace(/\u3000/g, " ");
  // カタカナ → ひらがな
  t = t.replace(/[\u30A1-\u30F6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
  return t.toLowerCase().trim();
}

// クエリを空白区切りで複数語に分割（全部含むものをヒット＝AND検索）
function tokenizeQuery(q) {
  return normalizeForSearch(q).split(/\s+/).filter(Boolean);
}

// テキストが全トークンを含むか
function matchAllTokens(text, tokens) {
  const n = normalizeForSearch(stripHtml(text));
  return tokens.every(tk => n.includes(tk));
}

// セクション/サブセクション/孫を再帰的に走査してヒットを集める
// パス：[セクション名, サブ名, 孫名, ...]
function collectHits(node, tokens, pathLabels, hits, cat, sectionIndex) {
  // node には title, tasks, subsections|children がある可能性
  const title = node.title || "";
  const titleHit = title && matchAllTokens(title, tokens);
  const matchedTasks = (node.tasks || []).filter(t => matchAllTokens(t, tokens));

  if (titleHit || matchedTasks.length > 0) {
  hits.push({
    cat,
    sectionIndex,
    path: [...pathLabels, title].filter(Boolean),
    title,
    titleHit,
    matchedTasks,
    allTasks: node.tasks || []
  });
  }

  const subKeys = ["subsections", "children"];
  for (const k of subKeys) {
  if (Array.isArray(node[k])) {
    node[k].forEach(child => {
      collectHits(child, tokens, [...pathLabels, title].filter(Boolean), hits, cat, sectionIndex);
    });
  }
  }
}

function handleSearch(query) {
  searchQuery = query.trim();
  const area = document.getElementById("contentArea");
  if (!searchQuery) { renderContent(currentCat); buildNav(); return; }
  document.getElementById("breadcrumbCurrent").textContent = `「${searchQuery}」の検索結果`;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));

  const tokens = tokenizeQuery(searchQuery);
  if (tokens.length === 0) { renderContent(currentCat); buildNav(); return; }

  const hits = [];
  data.forEach(cat => {
  const catHit = matchAllTokens(cat.label, tokens) || matchAllTokens(cat.desc || "", tokens);
  cat.sections.forEach((sec, si) => {
    const before = hits.length;
    collectHits(sec, tokens, [], hits, cat, si);
    // カテゴリ名／説明だけがヒットして中身ゼロのときも、トップ階層を1件だけ拾う
    if (catHit && hits.length === before) {
      hits.push({
        cat, sectionIndex: si, path: [sec.title], title: sec.title,
        titleHit: false, matchedTasks: [], allTasks: sec.tasks || []
      });
    }
  });
  });

  if (hits.length === 0) {
  area.innerHTML = `<div class="search-empty">「${escHtml(searchQuery)}」に一致する項目が見つかりませんでした。</div>`;
  return;
  }

  area.innerHTML = `<div style="margin-bottom:20px;font-size:13px;color:#6B7280">${hits.length}件 見つかりました</div><div id="searchResults"></div>`;
  const container = document.getElementById("searchResults");

  hits.forEach(({ cat, path, title, matchedTasks, allTasks }) => {
  const el = document.createElement("div");
  el.className = "search-result-item";
  el.style.borderLeftColor = cat.color;

  const breadcrumb = path.length > 1
    ? path.slice(0, -1).map(p => escHtml(p)).join(" › ")
    : "";

  const previewSource = matchedTasks.length > 0 ? matchedTasks : allTasks.slice(0, 3);
  const preview = previewSource.length > 0
    ? previewSource.map(t => highlightTokens(stripHtml(t), tokens)).join(" ・ ")
    : "";

  el.innerHTML = `
    <div class="search-result-cat" style="color:${cat.color}">${cat.icon} ${escHtml(cat.label)}${breadcrumb ? ` <span style="color:#9CA3AF;font-weight:400;">／ ${breadcrumb}</span>` : ""}</div>
    <div class="search-result-title">${highlightTokens(title, tokens)}</div>
    ${preview ? `<div class="search-result-preview">${preview}</div>` : ""}
  `;
  el.onclick = () => {
    document.getElementById("searchInput").value = ""; searchQuery = "";
    currentCat = cat; openSections.clear(); buildNav(); renderContent(cat);
  };
  container.appendChild(el);
  });
}

// 元テキスト中で各トークンに該当する区間を <mark> で囲む（正規化基準でマッチ判定）
function highlightTokens(text, tokens) {
  const plain = stripHtml(text);
  const escaped = escHtml(plain);
  if (!tokens || tokens.length === 0) return escaped;

  // 元テキストと正規化テキストは長さが同じになるよう、全角→半角／カナ→かなだけ使い、削除はしない
  // → normalizeForSearch は文字数を変えないため、インデックスがそのまま使える
  const norm = normalizeForSearch(plain);

  const ranges = [];
  tokens.forEach(tk => {
  if (!tk) return;
  let from = 0;
  while (from <= norm.length) {
    const idx = norm.indexOf(tk, from);
    if (idx === -1) break;
    ranges.push([idx, idx + tk.length]);
    from = idx + tk.length;
  }
  });
  if (ranges.length === 0) return escaped;

  // 範囲をマージ
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
  const last = merged[merged.length - 1];
  if (ranges[i][0] <= last[1]) {
    last[1] = Math.max(last[1], ranges[i][1]);
  } else {
    merged.push(ranges[i]);
  }
  }

  // 元テキスト（plain）の対応区間を <mark> で囲む。escHtml の影響を受けるので一文字ずつ組み立てる
  let out = "";
  let cursor = 0;
  merged.forEach(([s, e]) => {
  out += escHtml(plain.slice(cursor, s));
  out += `<mark>${escHtml(plain.slice(s, e))}</mark>`;
  cursor = e;
  });
  out += escHtml(plain.slice(cursor));
  return out;
}

function highlight(text, query) {
  // 後方互換のため残す
  return highlightTokens(stripHtml(text), tokenizeQuery(query));
}
function escHtml(str) { return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escRegex(str) { return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

init();
